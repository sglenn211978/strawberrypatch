<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#c0392b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Strawberry Patch"/>
<title>Strawberry Patch Eggs</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "eefcd664-dc0b-47c3-ae68-c2d4f1d26869",
    });
  });
</script>

<style>
/* Include all CSS from your repo here */
/* Added Responsive Desktop Support */
@media (min-width: 768px) {
  body { display: flex; justify-content: center; padding: 40px 0; background: #e2e2e2; }
  .scr { border-radius: 24px; max-width: 500px; height: 90vh; margin: 0 auto; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
}
/* Ensure screens are hidden by default */
.scr { display: none; min-height: 100dvh; background: var(--cream); }
.scr.on { display: block; }
</style>
</head>
<body>

<script>
/* --- Standardized Logic --- */
let S = { setup: false, profile: { name:'', farm:'Strawberry Patch Eggs', phone:'', avatar:'🧑‍🌾' }, inventory: { duck:0, chicken:0 }, sales: [], collections: [], prices: { duck:.75, chicken:.50, duck12:8, chk12:5 } };

function save(){ localStorage.setItem('spe3', JSON.stringify(S)); }
function load(){ const d = localStorage.getItem('spe3'); if(d) S = JSON.parse(d); }

/* Updated Navigation with Smooth Scroll */
function go(id){
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  const target = document.getElementById('s-' + id);
  if(target) {
    target.classList.add('on');
    target.scrollIntoView({ behavior: 'smooth' });
  }
}

/* Updated sendText with OneSignal Tagging */
function sendText(){
  const name = document.getElementById('cu-name').value.trim();
  const phone = document.getElementById('cu-phone').value.trim();
  if(!name || !phone) { toast('Name and phone required', 'err'); return; }

  window.OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.User.addTag("customer_name", name);
  });

  const ppu = cuType === 'duck' ? S.prices.duck : S.prices.chicken;
  const tot = (ppu * cuQty).toFixed(2);
  const msg = `Hi! I'd like to order ${cuQty} ${cuType} eggs from ${S.profile.farm}. Est Total: $${tot}. - ${name}`;
  window.location.href = `sms:${(S.profile.phone || '').replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`;
}

// Add the rest of your repo's JS functions here
</script>
</body>
</html>
