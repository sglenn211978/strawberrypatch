<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#c0392b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Strawberry Patch Eggs</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#c0392b;--red-dark:#922b21;--red-light:#e74c3c;--red-pale:#fdecea;
  --green:#3a6b35;--green-mid:#5a9e52;--green-pale:#eaf4e8;
  --cream:#fdf6ee;--tan:#e8d5b7;--brown:#7d4e2d;
  --text:#2d1a0e;--muted:#9b7b5a;--white:#ffffff;
  --shadow-sm:0 2px 8px rgba(90,40,10,.12);--shadow:0 4px 20px rgba(90,40,10,.18);
  --radius:16px;--radius-sm:10px;
}
/* Desktop & Mobile Responsive Wrapper */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lora',serif;background:#e2e2e2;color:var(--text);min-height:100dvh;display:flex;justify-content:center;align-items:flex-start}
.screen{display:none;width:100%;max-width:500px;min-height:100dvh;background:var(--cream);position:relative;z-index:1;box-shadow:var(--shadow);}
.screen.active{display:block}
@media (min-width: 768px) {
  body { padding: 40px 0; }
  .screen { border-radius: 30px; min-height: 850px; height: 90vh; overflow-y: auto; }
}

/* ── REUSABLE UI ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:14px 22px;border-radius:999px;border:none;font-weight:600;cursor:pointer;transition:all .2s;width:100%;font-family:inherit;}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin:12px;box-shadow:var(--shadow-sm);border:1px solid var(--tan)}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:999px;opacity:0;transition:0.3s;z-index:1000;}
#toast.show{opacity:1;}

/* (Copy the remaining original CSS classes for .welcome, .stats-strip, .owner-main, etc. here) */
</style>
</head>
<body>

<div class="screen active" id="scr-welcome">
  <div style="text-align:center;padding:100px 20px;">
    <h1 style="font-family:'Abril Fatface';font-size:3rem;color:var(--red);">🍓 Strawberry Patch</h1>
    <p style="font-family:'Caveat';font-size:1.5rem;margin-bottom:40px;">Backyard Fresh Eggs</p>
    <button class="btn btn-red" onclick="goOwner()" style="margin-bottom:10px;">👩‍🌾 I'm the Owner</button>
    <button class="btn btn-green" onclick="goCustomer()">🛒 I want to buy Eggs</button>
  </div>
</div>

<div class="screen" id="scr-owner">
  </div>

<div class="screen" id="scr-customer">
  <div class="card">
    <h3>Pay via:</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button class="btn" style="background:#003087;color:white;" onclick="pay('Venmo')">Venmo</button>
        <button class="btn" style="background:#6d1ed4;color:white;" onclick="pay('Zelle')">Zelle</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let S = { profile: null, inventory: { duck: 0, chicken: 0 }, sales: [] };
const save = () => localStorage.setItem('strawberry_v2', JSON.stringify(S));
const load = () => { const d = localStorage.getItem('strawberry_v2'); if(d) S = JSON.parse(d); };

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  target.classList.add('active');
  target.scrollIntoView({ behavior: 'smooth' }); // AUTO-SCROLL
}

function pay(method) {
  const handle = S.profile ? S.profile.phone : "555-555-5555";
  if(method === 'Venmo') window.location.href = `venmo://paycharge?txn=pay&recipients=${handle}`;
  navigator.clipboard.writeText(handle);
  toast(`${method} info copied to clipboard!`);
}

function toast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

window.onload = load;
</script>
</body>
</html>
