<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#c0392b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Strawberry Patch Eggs</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "eefcd664-dc0b-47c3-ae68-c2d4f1d26869",
    });
  });
</script>

<style>
/* --- Premium Farmhouse Styles --- */
:root {
  --red:#c0392b; --red-d:#7b241c; --grn:#2e7d32; --cream:#fdf6ee; --tan:#e8d5b7;
  --text:#2d1a0e; --white:#fff; --r:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lora',serif;background:#f0f0f0;color:var(--text);display:flex;justify-content:center;}
.screen{display:none;width:100%;max-width:500px;min-height:100vh;background:var(--cream);box-shadow:0 0 40px rgba(0,0,0,0.1);overflow-x:hidden;}
.screen.on{display:block;}
@media (min-width: 768px) { .screen { border-radius: var(--r); height: 90vh; margin: 5vh 0; overflow-y: auto; } }

/* Utility Classes */
.btn{display:flex;align-items:center;justify-content:center;padding:16px;border-radius:99px;border:none;font-weight:600;cursor:pointer;width:100%;transition:0.2s;}
.btn-red{background:var(--red);color:#white;}
.card{background:var(--white);border-radius:16px;padding:20px;margin:15px;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid var(--tan);}

/* (Existing classes from your previous upload continue here...) */
</style>
</head>
<body>

<div class="screen on" id="s-welcome">
  <div style="text-align:center;padding:80px 20px;">
    <h1 style="font-family:'Abril Fatface';font-size:3rem;color:var(--red-d);">🍓 Strawberry Patch</h1>
    <button class="btn btn-red" onclick="go('owner')">Owner Mode</button>
    <button class="btn" style="margin-top:10px;" onclick="go('cust')">Customer Mode</button>
  </div>
</div>

<div class="screen" id="s-owner"> </div>
<div class="screen" id="s-cust"> </div>

<script>
let S = { setup:false, profile:{}, inventory:{duck:0,chicken:0}, sales:[] };
const save = () => localStorage.setItem('spe_v2', JSON.stringify(S));

function go(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  const target = document.getElementById('s-'+id);
  if(target){
    target.classList.add('on');
    target.scrollIntoView({ behavior: 'smooth' }); // AUTO-SCROLL
  }
}

async function sendText() {
  const name = document.getElementById('cu-name').value.trim();
  const phone = document.getElementById('cu-phone').value.trim();
  
  if(!name || !phone) return;

  // Trigger OneSignal Tagging
  window.OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.User.addTag("last_customer", name);
  });

  const msg = `Order from ${name}: ${cuQty} ${cuType} eggs.`;
  window.location.href = `sms:${S.profile.phone}?body=${encodeURIComponent(msg)}`;
}
</script>
</body>
</html>
